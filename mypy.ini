[mypy]
python_version = 3.13
warn_return_any = False
warn_unused_configs = True
show_error_codes = True
warn_redundant_casts = True
warn_unused_ignores = True

[mypy-flask_sqlalchemy.*]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-server.models.*]
ignore_errors = True

[mypy-server.tests.*]
ignore_errors = True